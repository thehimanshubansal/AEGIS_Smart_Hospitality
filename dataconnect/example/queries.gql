query listActiveIncidents @auth(level: PUBLIC) {
  incidents(where: { status: { eq: "Active" } }, orderBy: [{ timestamp: DESC }]) {
    id
    title
    severity
    status
    timestamp
    roomId
    description
  }
}

query listIncidents @auth(level: PUBLIC) {
  incidents(orderBy: [{ timestamp: DESC }]) {
    id
    title
    severity
    status
    timestamp
    roomId
    description
  }
}

query listRooms @auth(level: PUBLIC) {
  rooms(orderBy: [{ floor: ASC }, { number: ASC }]) {
    id
    number
    floor
    type
    status
    guests_on_room {
      id
      name
      checkIn
      createdAt
    }
  }
}

