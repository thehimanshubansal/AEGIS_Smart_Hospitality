# dataconnect/example/queries.gql

query getUserLogin($firebaseUid: String!) @auth(level: PUBLIC) {
  userLogin(key: { firebaseUid: $firebaseUid }) {
    firebaseUid
    email
    displayName
    role
    lastLogin
    createdAt
  }
}

query listUserLogins @auth(level: PUBLIC) {
  userLogins {
    firebaseUid
    email
    displayName
    role
  }
}

query getUserLoginByEmail($email: String!) @auth(level: PUBLIC) {
  userLogins(where: { email: { eq: $email } }) {
    firebaseUid
    email
    displayName
    role
  }
}

query getGuestByUid($uid: String!) @auth(level: PUBLIC) {
  guests(where: { firebaseUid: { eq: $uid } }) {
    id
    name
    email
    roomNumber
    loginEmail
    loginPassword
    idNumber
    contact
    address
    status
    checkIn
    checkOut
    loginToken
    qrPayload
    firebaseUid
    photoUrl
    createdAt
    room {
      id
      number
      floor
    }
  }
}

