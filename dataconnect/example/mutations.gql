mutation createIncident($title: String!, $severity: String!, $roomId: String, $description: String, $status: String) @auth(level: PUBLIC) {
  incident_insert(data: {
    title: $title,
    severity: $severity,
    roomId: $roomId,
    description: $description,
    status: $status
  })
}

mutation updateIncident($id: UUID!, $status: String!) @auth(level: PUBLIC) {
  incident_update(id: $id, data: { status: $status })
}

mutation createRoom($number: String!, $floor: Int!, $type: String!, $status: String!) @auth(level: PUBLIC) {
  room_insert(data: {
    number: $number,
    floor: $floor,
    type: $type,
    status: $status
  })
}

mutation updateRoom($id: UUID!, $number: String, $floor: Int, $type: String, $status: String) @auth(level: PUBLIC) {
  room_update(id: $id, data: {
    number: $number,
    floor: $floor,
    type: $type,
    status: $status
  })
}

mutation deleteRoom($id: UUID!) @auth(level: PUBLIC) {
  room_delete(id: $id)
}

mutation deleteGuest($id: UUID!) @auth(level: PUBLIC) {
  guest_delete(id: $id)
}

mutation deleteStaff($id: UUID!) @auth(level: PUBLIC) {
  staff_delete(id: $id)
}

mutation deleteIncident($id: UUID!) @auth(level: PUBLIC) {
  incident_delete(id: $id)
}

mutation updateGuestPassword($id: UUID!, $loginPassword: String) @auth(level: PUBLIC) {
  guest_update(id: $id, data: { loginPassword: $loginPassword })
}

mutation updateStaffPassword($id: UUID!, $loginPassword: String) @auth(level: PUBLIC) {
  staff_update(id: $id, data: { loginPassword: $loginPassword })
}

