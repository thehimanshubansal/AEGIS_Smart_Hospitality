# dataconnect/example/mutations.gql

mutation upsertUserLogin($firebaseUid: String!, $email: String!, $displayName: String, $role: String!) @auth(level: PUBLIC) {
  userLogin_upsert(data: {
    firebaseUid: $firebaseUid,
    email: $email,
    displayName: $displayName,
    role: $role
  })
}

mutation createGuest($firebaseUid: String, $email: String, $name: String!, $roomNumber: String, $status: String!, $checkOut: Timestamp!, $photoUrl: String) @auth(level: PUBLIC) {
  guest_insert(data: {
    firebaseUid: $firebaseUid,
    email: $email,
    name: $name,
    roomNumber: $roomNumber,
    status: $status,
    checkOut: $checkOut,
    photoUrl: $photoUrl
  })
}

mutation updateGuest(
  $id: UUID!, 
  $name: String, 
  $email: String, 
  $firebaseUid: String, 
  $status: String, 
  $roomNumber: String, 
  $loginToken: String, 
  $roomId: UUID, 
  $qrPayload: String,
  $idNumber: String,
  $contact: String,
  $address: String,
  $checkOut: Timestamp,
  $loginEmail: String,
  $loginPassword: String,
  $photoUrl: String
) @auth(level: PUBLIC) {
  guest_update(id: $id, data: {
    name: $name,
    email: $email,
    firebaseUid: $firebaseUid,
    status: $status,
    roomNumber: $roomNumber,
    loginToken: $loginToken,
    roomId: $roomId,
    qrPayload: $qrPayload,
    idNumber: $idNumber,
    contact: $contact,
    address: $address,
    checkOut: $checkOut,
    loginEmail: $loginEmail,
    loginPassword: $loginPassword,
    photoUrl: $photoUrl
  })
}

mutation createStaff(
  $firebaseUid: String, 
  $email: String, 
  $loginPassword: String,
  $name: String!, 
  $role: String!, 
  $status: String!,
  $employeeId: String,
  $department: String,
  $phone: String,
  $emergencyContact: String,
  $bloodGroup: String,
  $joiningDate: Timestamp,
  $validTill: Timestamp,
  $photoUrl: String
) @auth(level: PUBLIC) {
  staff_insert(data: {
    firebaseUid: $firebaseUid,
    email: $email,
    loginPassword: $loginPassword,
    name: $name,
    role: $role,
    status: $status,
    employeeId: $employeeId,
    department: $department,
    phone: $phone,
    emergencyContact: $emergencyContact,
    bloodGroup: $bloodGroup,
    joiningDate: $joiningDate,
    validTill: $validTill,
    photoUrl: $photoUrl
  })
}

mutation updateStaff(
  $id: UUID!, 
  $name: String, 
  $email: String, 
  $firebaseUid: String, 
  $role: String, 
  $department: String, 
  $status: String,
  $phone: String,
  $emergencyContact: String,
  $bloodGroup: String,
  $joiningDate: Timestamp,
