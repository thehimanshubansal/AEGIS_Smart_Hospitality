<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" style="background-color: #f8fafc; font-family: sans-serif;">
  <!-- Background / Main Outline -->
  <rect x="50" y="50" width="900" height="500" fill="#ffffff" stroke="#334155" stroke-width="4" />
  
  <!-- Central Corridor (Main Walkway) -->
  <rect x="150" y="250" width="700" height="100" fill="#e2e8f0" />
  <text x="500" y="305" font-size="24" fill="#64748b" text-anchor="middle" font-weight="bold">Main Corridor</text>

  <!-- Left Stairwell & Exit -->
  <rect x="50" y="250" width="100" height="100" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
  <text x="100" y="295" font-size="18" fill="#1e293b" text-anchor="middle" font-weight="bold">STAIRS</text>
  <text x="100" y="320" font-size="14" fill="#dc2626" text-anchor="middle" font-weight="bold">EXIT W</text>
  <line x1="150" y1="280" x2="150" y2="320" stroke="#f8fafc" stroke-width="4" /> <!-- Door -->

  <!-- Right Elevator Bank & Exit -->
  <rect x="850" y="250" width="100" height="100" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
  <text x="900" y="295" font-size="18" fill="#1e293b" text-anchor="middle" font-weight="bold">ELEVATOR</text>
  <text x="900" y="320" font-size="14" fill="#dc2626" text-anchor="middle" font-weight="bold">EXIT E</text>
  <line x1="850" y1="280" x2="850" y2="320" stroke="#f8fafc" stroke-width="4" /> <!-- Door -->

  <!-- Top Rooms -->
  <!-- Room 601 -->
  <rect x="150" y="50" width="175" height="200" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="237" y="150" font-size="20" fill="#334155" text-anchor="middle">Room 601</text>
  <line x1="220" y1="250" x2="255" y2="250" stroke="#ffffff" stroke-width="6" /> <!-- Door -->

  <!-- Room 602 -->
  <rect x="325" y="50" width="175" height="200" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="412" y="150" font-size="20" fill="#334155" text-anchor="middle">Room 602</text>
  <line x1="395" y1="250" x2="430" y2="250" stroke="#ffffff" stroke-width="6" /> <!-- Door -->

  <!-- Room 603 -->
  <rect x="500" y="50" width="175" height="200" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="587" y="150" font-size="20" fill="#334155" text-anchor="middle">Room 603</text>
  <line x1="570" y1="250" x2="605" y2="250" stroke="#ffffff" stroke-width="6" /> <!-- Door -->

  <!-- Room 604 -->
  <rect x="675" y="50" width="175" height="200" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="762" y="150" font-size="20" fill="#334155" text-anchor="middle">Room 604</text>
  <line x1="745" y1="250" x2="780" y2="250" stroke="#ffffff" stroke-width="6" /> <!-- Door -->

  <!-- Bottom Rooms -->
  <!-- Room 605 -->
  <rect x="150" y="350" width="175" height="200" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="237" y="460" font-size="20" fill="#334155" text-anchor="middle">Room 605</text>
  <line x1="220" y1="350" x2="255" y2="350" stroke="#ffffff" stroke-width="6" /> <!-- Door -->

  <!-- Room 606 -->
  <rect x="325" y="350" width="175" height="200" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="412" y="460" font-size="20" fill="#334155" text-anchor="middle">Room 606</text>
  <line x1="395" y1="350" x2="430" y2="350" stroke="#ffffff" stroke-width="6" /> <!-- Door -->

  <!-- Utility / Staff Area -->
  <rect x="500" y="350" width="350" height="200" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
  <text x="675" y="440" font-size="20" fill="#334155" text-anchor="middle" font-weight="bold">Staff Breakroom &amp; Storage</text>
  <text x="675" y="470" font-size="16" fill="#64748b" text-anchor="middle">Authorized Personnel Only</text>
  <line x1="600" y1="350" x2="650" y2="350" stroke="#ffffff" stroke-width="6" /> <!-- Door 1 -->
  <line x1="700" y1="350" x2="750" y2="350" stroke="#ffffff" stroke-width="6" /> <!-- Door 2 -->

  <!-- Dimensions / Blueprint details -->
  <line x1="50" y1="30" x2="950" y2="30" stroke="#cbd5e1" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="500" y="20" font-size="14" fill="#64748b" text-anchor="middle">54.0m</text>

  <line x1="30" y1="50" x2="30" y2="550" stroke="#cbd5e1" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="15" y="300" font-size="14" fill="#64748b" text-anchor="middle" transform="rotate(-90 15,300)">18.0m</text>

</svg>
